@if(isLoading){

<app-loader></app-loader>

}

<div class="team-lead-list-container">

    <app-page-header title="Manage Team Leads" subtitle="Create, update and manage team leads"
        buttonText="Add Team Lead" buttonIcon="add" (buttonClick)="openCreateDialog()">
    </app-page-header>

    <div class="filters-section">

        <mat-form-field appearance="outline">

            <mat-label>

                Search Team Lead

            </mat-label>

            <input matInput [formControl]="searchControl" placeholder="Search by name, username or email">

            <mat-icon matSuffix>

                search

            </mat-icon>

        </mat-form-field>

    </div>

    <div class="table-container">

        @if(dataSource.data.length > 0){

        <table mat-table [dataSource]="dataSource" matSort (matSortChange)="sortChanged($event)">

            <ng-container matColumnDef="fullName">

                <th mat-header-cell *matHeaderCellDef mat-sort-header="fullName">

                    Full Name

                </th>

                <td mat-cell *matCellDef="let teamLead">

                    {{ teamLead.fullName }}

                </td>

            </ng-container>

            <ng-container matColumnDef="username">

                <th mat-header-cell *matHeaderCellDef mat-sort-header="username">

                    Username

                </th>

                <td mat-cell *matCellDef="let teamLead">

                    {{ teamLead.username }}

                </td>

            </ng-container>

            <ng-container matColumnDef="email">

                <th mat-header-cell *matHeaderCellDef mat-sort-header="email">

                    Email

                </th>

                <td mat-cell *matCellDef="let teamLead">

                    {{ teamLead.email }}

                </td>

            </ng-container>

            <ng-container matColumnDef="createdAt">

                <th mat-header-cell *matHeaderCellDef mat-sort-header="createdAt">

                    Created On

                </th>

                <td mat-cell *matCellDef="let teamLead">

                    {{ teamLead.createdAt | date:'dd-MM-yyyy' }}

                </td>

            </ng-container>

            <ng-container matColumnDef="actions">

                <th mat-header-cell *matHeaderCellDef>

                    Actions

                </th>

                <td mat-cell *matCellDef="let teamLead">

                    <div class="action-buttons">

                        <button mat-icon-button color="primary" matTooltip="Edit" (click)="openEditDialog(teamLead)">

                            <mat-icon>

                                edit

                            </mat-icon>

                        </button>

                        <button mat-icon-button color="warn" matTooltip="Delete" (click)="deleteTeamLead(teamLead)">

                            <mat-icon>

                                delete

                            </mat-icon>

                        </button>

                    </div>

                </td>

            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns">
            </tr>

            <tr mat-row *matRowDef="let row; columns: displayedColumns">
            </tr>

        </table>

        } @else {

        <app-no-records title="No Team Leads Found" message="No team leads are available at the moment.">
        </app-no-records>

        }

    </div>

    @if(pagination.totalRecords > 0){

    <mat-paginator [length]="pagination.totalRecords" [pageIndex]="pagination.page - 1" [pageSize]="pagination.limit"
        [pageSizeOptions]="[5,10,25,50]" (page)="pageChanged($event)" showFirstLastButtons>
    </mat-paginator>

    }

</div>
