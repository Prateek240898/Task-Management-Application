@if(isLoading){

<app-loader></app-loader>

}

<div class="manager-list-container">

    <app-page-header title="Manage Managers" subtitle="Create, update and manage managers" buttonText="Add Manager"
        buttonIcon="add" (buttonClick)="openCreateDialog()">
    </app-page-header>

    <div class="filters-section">

        <mat-form-field appearance="outline">

            <mat-label>

                Search Manager

            </mat-label>

            <input matInput [formControl]="searchControl" placeholder="Search by name, username or email">

            <mat-icon matSuffix>

                search

            </mat-icon>

        </mat-form-field>

    </div>

    <div class="table-container">

        @if(dataSource.data.length > 0){

        <table mat-table [dataSource]="dataSource" matSort (matSortChange)="sortChanged($event)">

            <!-- Full Name -->

            <ng-container matColumnDef="fullName">

                <th mat-header-cell *matHeaderCellDef mat-sort-header="fullName">

                    Full Name

                </th>

                <td mat-cell *matCellDef="let manager">

                    {{ manager.fullName }}

                </td>

            </ng-container>

            <!-- Username -->

            <ng-container matColumnDef="username">

                <th mat-header-cell *matHeaderCellDef mat-sort-header="username">

                    Username

                </th>

                <td mat-cell *matCellDef="let manager">

                    {{ manager.username }}

                </td>

            </ng-container>

            <!-- Email -->

            <ng-container matColumnDef="email">

                <th mat-header-cell *matHeaderCellDef mat-sort-header="email">

                    Email

                </th>

                <td mat-cell *matCellDef="let manager">

                    {{ manager.email }}

                </td>

            </ng-container>

            <!-- Created At -->

            <ng-container matColumnDef="createdAt">

                <th mat-header-cell *matHeaderCellDef mat-sort-header="createdAt">

                    Created On

                </th>

                <td mat-cell *matCellDef="let manager">

                    {{
                    manager.createdAt
                    | date:'dd-MM-yyyy'
                    }}

                </td>

            </ng-container>

            <!-- Actions -->

            <ng-container matColumnDef="actions">

                <th mat-header-cell *matHeaderCellDef>

                    Actions

                </th>

                <td mat-cell *matCellDef="let manager">

                    <div class="action-buttons">

                        <button mat-icon-button color="primary" (click)="openEditDialog(manager)" matTooltip="Edit">

                            <mat-icon>

                                edit

                            </mat-icon>

                        </button>

                        <button mat-icon-button color="warn" (click)="deleteManager(manager)" matTooltip="Delete">

                            <mat-icon>

                                delete

                            </mat-icon>

                        </button>

                    </div>

                </td>

            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns">

            </tr>

            <tr mat-row *matRowDef="
                let row;
                columns: displayedColumns
                ">

            </tr>

        </table>

        } @else {

        <app-no-records title="No Managers Found" message="No managers are available at the moment.">

        </app-no-records>

        }

    </div>

    @if(
    pagination.totalRecords > 0
    ){

    <mat-paginator [length]="pagination.totalRecords" [pageIndex]="pagination.page - 1" [pageSize]="pagination.limit"
        [pageSizeOptions]="[5,10,25,50]" (page)="pageChanged($event)" showFirstLastButtons>

    </mat-paginator>

    }

</div>
